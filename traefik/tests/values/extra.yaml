extraObjects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: "extra"
    data:
      something: "extra"
  - |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: "templated"
    data:
      something: {{ printf "templated" }}
  - |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: "from-extra-values"
    data:
      myKey: {{ .Values.extraValues.myKey }}
      nested: {{ .Values.extraValues.nested.deep }}

extraValues:
  myKey: myValue
  nested:
    deep: nestedValue
