suite: Requirements
templates:
  - requirements.yaml
tests:
  - it: should fail when trying to use this Chart with Traefik Proxy v2
    set:
      image:
        tag: v2.11.0
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: This version of the Chart only supports Traefik Proxy v3.6+"
  - it: should fail when trying to use this Chart with Traefik Proxy v3.5
    set:
      image:
        tag: v3.5.0
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: This version of the Chart only supports Traefik Proxy v3.6+"
  - it: should pass when trying to use this Chart with Traefik Proxy v3.6 experimental
    set:
      image:
        repository: traefik/traefik
        tag: experimental-v3.6
    asserts:
      - notFailedTemplate: {}
  - it: should pass when trying to use this Chart with Traefik Proxy experimental master (latest one)
    set:
      image:
        repository: traefik/traefik
        tag: experimental-master
    asserts:
      - notFailedTemplate: {}
  - it: should not pass when trying to use this Chart with unknown tag
    set:
      image:
        repository: traefik/traefik
        tag: unknown
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: version \"unknown\" is not supported"
  - it: should fail when trying to use this Chart with Traefik Proxy v3 and Hub enabled
    set:
      hub:
        token: xxx
    asserts:
      - failedTemplate:
          errorMessage: "When using Traefik Hub image tag needs to be specified!"
  - it: should fail when trying to use this Chart with Traefik Hub < v3.19.3
    set:
      image:
        registry: ghcr.io
        repository: traefik/traefik-hub
        tag: v3.19.0
      hub:
        token: xxx
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: this Chart supports *only* Traefik Hub >= v3.19.3."
  - it: should succeed when trying to use this Chart with Traefik Hub >= v3.19.3
    set:
      image:
        registry: ghcr.io
        repository: traefik/traefik-hub
        tag: v3.19.3
      hub:
        token: xxx
    asserts:
      - notFailedTemplate: {}
  - it: should pass when trying to use this Chart with Traefik API gateway v3 and Hub enabled and providing a token
    set:
      image:
        registry: ghcr.io
        repository: traefik/traefik-hub
        tag: latest
      hub:
        token: "xxx"
    asserts:
      - notFailedTemplate: {}
  - it: should fail when using knative without experimental flag
    set:
      providers:
        knative:
          enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: Knative is experimental. Enable it by setting experimental.knative to true"
  - it: should fail when using kubernetesIngressNGINX provider on traefik < 3.6.2
    set:
      image:
        tag: v3.6.1
      providers:
        kubernetesIngressNGINX:
          enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: Kubernetes Ingress NGINX provider is only available for traefik >= v3.6.2."
  - it: should not fail when using kubernetesIngressNGINX provider on traefik >= 3.6.2
    set:
      image:
        tag: v3.6.2
      providers:
        kubernetesIngressNGINX:
          enabled: true
    asserts:
      - notFailedTemplate: {}
  - it: should fail when using kubernetesIngressNGINX v3.7 options on traefik < 3.7.0
    set:
      image:
        tag: v3.6.2
      providers:
        kubernetesIngressNGINX:
          enabled: true
          httpEntryPoint: "web"
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: some Kubernetes Ingress NGINX provider options require traefik >= v3.7.0."
  - it: should not fail when using kubernetesIngressNGINX v3.7 options on traefik >= 3.7.0
    set:
      image:
        tag: v3.7.0-ea.1
      providers:
        kubernetesIngressNGINX:
          enabled: true
          httpEntryPoint: "web"
    asserts:
      - notFailedTemplate: {}
  - it: should succeed when using version override with nativeLBByDefault on kubernetesGateway
    set:
      image:
        tag: sha256:xxx
      versionOverride: v3.6.0
      providers:
        kubernetesGateway:
          enabled: true
          nativeLBByDefault: true
    asserts:
      - notFailedTemplate: {}
  - it: should not fail when using traefik-hub API management with namespaced RBACs after v3.19.3
    set:
      image:
        registry: "ghcr.io"
        repository: "traefik/traefik-hub"
        tag: "v3.19.3"
      hub:
        token: xxx
        apimanagement:
          enabled: true
      rbac:
        namespaced: true
    asserts:
      - notFailedTemplate: {}
  - it: should not be possible to namespace rbac without one of the required providers
    set:
      rbac:
        namespaced: true
      providers:
        kubernetesCRD:
          enabled: false
        kubernetesIngress:
          enabled: false
    asserts:
      - failedTemplate:
        errorMessage: "ERROR: namespaced rbac requires Kubernetes CRD or Kubernetes Ingress provider"
  - it: should fail when enabling Kubernete Gateway provider with namespaced RBACs
    set:
      providers:
        kubernetesGateway:
          enabled: true
      rbac:
        namespaced: true
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: Kubernetes Gateway provider requires ClusterRole. RBAC cannot be namespaced."
  - it: should fail when trying to use certResolvers
    set:
      certResolvers:
        myAcmeResolver:
          email: email@example.com
          dnsChallenge:
            provider: myProvider
            resolvers:
              - 1.1.1.1
              - 8.8.8.8
          tlsChallenge: true
    asserts:
      - failedTemplate:
          errorPattern: "values don't meet the specifications of the schema"
  - it: should fail when using Traefik Hub without image registry and repository specified.
    set:
      hub:
        token: "xxx"
    asserts:
      - failedTemplate:
          errorMessage: "When using Traefik Hub image tag needs to be specified!"
  - it: should not fail when using Traefik Hub with tag set for OCI
    set:
      hub:
        token: "xxx"
      oci_meta:
        enabled: true
        images:
          hub:
            tag: v3.19.3
    asserts:
      - notFailedTemplate: {}
  - it: should fail when using hub.tracing.additionalTraceHeaders without tracing.otlp enabled
    set:
      image:
        registry: "ghcr.io"
        repository: "traefik/traefik-hub"
        tag: v3.19.3
      hub:
        token: "xxx"
        tracing:
          additionalTraceHeaders:
            enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: additionalTraceHeaders needs tracing.otlp to be enabled."
  - it: should not fail when using hub.tracing.additionalTraceHeaders on Traefik Hub v3.19.3+
    set:
      image:
        registry: "ghcr.io"
        repository: "traefik/traefik-hub"
        tag: v3.19.3
      tracing:
        otlp:
          enabled: true
      hub:
        token: "xxx"
        tracing:
          additionalTraceHeaders:
            enabled: true
    asserts:
      - notFailedTemplate: {}
  - it: should not fail when using mcpgateway on hub >= 3.19.3
    set:
      image:
        registry: "ghcr.io"
        repository: "traefik/traefik-hub"
        tag: v3.19.3
      hub:
        token: "xxx"
        mcpgateway:
          enabled: true
    asserts:
      - notFailedTemplate: {}
  - it: should fail when not using default values
    set:
      hub:
        namespaces: null
    asserts:
      - failedTemplate:
          errorPattern: "values don't meet the specifications of the schema"
  - it: should fail when using otlp logs without experimental flag
    set:
      logs:
        general:
          otlp:
            enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: otlp on logs or access logs is an experimental feature and needs experimental.otlpLogs=true."
  - it: should fail when using otlp access logs without experimental flag
    set:
      logs:
        general:
          otlp:
            enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: otlp on logs or access logs is an experimental feature and needs experimental.otlpLogs=true."
  - it: should fail when using sanitizePath security option on trafik < 3.6.4
    set:
      image:
        tag: v3.6.0
      ports:
        websecure:
          http:
            sanitizePath: false
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: request path security options are only available for traefik >= v3.6.4."
  - it: should fail when allowing encoded character filtering on trafik < 3.6.4
    set:
      image:
        tag: v3.6.0
      ports:
        websecure:
          http:
            encodedCharacters:
              allowEncodedSlash: true
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: request path security options are only available for traefik >= v3.6.4."
  - it: should fail when using accesslog dualOutput on traefik < 3.7.0
    set:
      image:
        tag: v3.6.10
      logs:
        access:
          dualOutput: true
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: accesslog.dualOutput is only available for traefik >= v3.7.0."
  - it: should fail when using notAppendXForwardedFor on traefik < 3.7.0
    set:
      image:
        tag: v3.6.10
      ports:
        websecure:
          forwardedHeaders:
            notAppendXForwardedFor: true
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: forwardedHeaders.notAppendXForwardedFor is only available for traefik >= v3.7.0."
  - it: should fail when using global notAppendXForwardedFor on traefik < 3.7.0
    set:
      image:
        tag: v3.6.10
      global:
        notAppendXForwardedFor: true
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: global.notAppendXForwardedFor is only available for traefik >= v3.7.0."
  - it: should fail when using uplink entrypoint on Traefik Proxy
    set:
      ports:
        web:
          uplink: true
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: uplink EntryPoints can only be used with Traefik Hub"
  - it: should fail when using uplink entrypoint on Traefik Hub < 3.20
    set:
      image:
        registry: "ghcr.io"
        repository: "traefik/traefik-hub"
        tag: v3.19.3
      ports:
        web:
          uplink: true
      hub:
        token: "xxx"
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: uplink is a feature only available for Traefik Hub >= v3.20.0."
  - it: should fail when using uplink entrypoint without multicluster provider
    set:
      image:
        registry: "ghcr.io"
        repository: "traefik/traefik-hub"
        tag: v3.20.0-ea.2
      ports:
        web:
          uplink: true
      hub:
        token: "xxx"
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: uplink EntryPoints requires the hub multicluster provider"
  - it: should pass when using uplink entrypoint with Hub >= 3.20 with multicluster provider enabled
    set:
      image:
        registry: "ghcr.io"
        repository: "traefik/traefik-hub"
        tag: v3.20.0-ea.2
      ports:
        web:
          uplink: true
      hub:
        token: "xxx"
        providers:
          multicluster:
            enabled: true
    asserts:
      - notFailedTemplate: {}
  - it: should fail when using pluginRegistry sources with unused plugin
    set:
      image:
        registry: "ghcr.io"
        repository: "traefik/traefik-hub"
        tag: v3.19.3
      hub:
        token: "xxx"
        pluginRegistry:
          sources:
            plugin1:
              baseModuleName: "gitlab.company.com"
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: pluginRegistry source plugin1 is not used in experimental.plugins."
  - it: should not fail when using pluginRegistry sources with used plugin
    set:
      image:
        registry: "ghcr.io"
        repository: "traefik/traefik-hub"
        tag: v3.19.3
      experimental:
        plugins:
          plugin1:
            moduleName: github.com/traefik/plugindemo
            version: v0.2.1
      hub:
        token: "xxx"
        pluginRegistry:
          sources:
            plugin1:
              baseModuleName: "gitlab.company.com"
    asserts:
      - notFailedTemplate: {}
