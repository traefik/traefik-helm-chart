suite: RBAC configuration
templates:
  - rbac/clusterrole.yaml
  - rbac/clusterrolebinding.yaml
  - rbac/role.yaml
  - rbac/rolebinding.yaml
  - rbac/serviceaccount.yaml
  - rbac/user-facing-roles.yaml
  - deployment.yaml
tests:
  - it: should create default RBAC related objects
    asserts:
      - isKind:
          of: ClusterRole
        template: rbac/clusterrole.yaml
      - isKind:
          of: ClusterRoleBinding
        template: rbac/clusterrolebinding.yaml
      - hasDocuments:
          count: 0
        template: rbac/role.yaml
      - hasDocuments:
          count: 0
        template: rbac/rolebinding.yaml
      - hasDocuments:
          count: 0
        template: rbac/user-facing-roles.yaml
      - isKind:
          of: ServiceAccount
        template: rbac/serviceaccount.yaml
      - equal:
          path: metadata.name
          value: RELEASE-NAME-traefik
        template: rbac/serviceaccount.yaml
      - equal:
          path: automountServiceAccountToken
          value: false
        template: rbac/serviceaccount.yaml
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-traefik
        template: deployment.yaml
      - equal:
          path: subjects[0].name
          value: RELEASE-NAME-traefik
        template: rbac/clusterrolebinding.yaml
      - equal:
          path: metadata.name
          value: RELEASE-NAME-traefik-NAMESPACE
        template: rbac/clusterrole.yaml
      - equal:
          path: metadata.name
          value: RELEASE-NAME-traefik-NAMESPACE
        template: rbac/clusterrolebinding.yaml
  - it: should set expected name when ns is overriden
    set:
      namespaceOverride: foo
      rbac:
        aggregateAdminTo:
          - admin
        aggregateViewTo:
          - view
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-traefik-foo
        template: rbac/clusterrole.yaml
      - equal:
          path: metadata.name
          value: RELEASE-NAME-traefik-foo
        template: rbac/clusterrolebinding.yaml
      - equal:
          path: metadata.name
          value: RELEASE-NAME-traefik-foo-admin
        documentIndex: 0
        template: rbac/user-facing-roles.yaml
      - equal:
          path: metadata.name
          value: RELEASE-NAME-traefik-foo-view
        documentIndex: 1
        template: rbac/user-facing-roles.yaml
  - it: should not create RBAC related objects when disabled
    set:
      rbac:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
        template: rbac/clusterrole.yaml
      - hasDocuments:
          count: 0
        template: rbac/clusterrolebinding.yaml
      - hasDocuments:
          count: 0
        template: rbac/role.yaml
      - hasDocuments:
          count: 0
        template: rbac/rolebinding.yaml
      - hasDocuments:
          count: 0
        template: rbac/user-facing-roles.yaml
  - it: should create RBAC related objects at namespace scope
    set:
      rbac:
        namespaced: true
        aggregateAdminTo:
          - admin
        aggregateViewTo:
          - view
    asserts:
      - isKind:
          of: Role
        template: rbac/role.yaml
      - isKind:
          of: RoleBinding
        template: rbac/rolebinding.yaml
      - hasDocuments:
          count: 0
        template: rbac/clusterrole.yaml
      - hasDocuments:
          count: 0
        template: rbac/clusterrolebinding.yaml
      - isKind:
          of: Role
        template: rbac/user-facing-roles.yaml
      - hasDocuments:
          count: 2
        template: rbac/user-facing-roles.yaml

  - it: should use existing ServiceAccount
    set:
      serviceAccount:
        name: foobar
    asserts:
      - hasDocuments:
          count: 0
        template: rbac/serviceaccount.yaml
      - equal:
          path: spec.template.spec.serviceAccountName
          value: foobar
        template: deployment.yaml
      - equal:
          path: subjects[0].name
          value: foobar
        template: rbac/clusterrolebinding.yaml
  - it: ClusterRole should not be able to update ingresses/status when kubernetesIngress is disabled
    set:
      providers:
        kubernetesIngress:
          enabled: false
    asserts:
      - notContains:
          path: rules
          content:
            - apiGroups:
                - extensions
                - networking.k8s.io
              resources:
                - ingresses/status
              verbs:
                - update
        template: rbac/clusterrole.yaml
  - it: ClusterRole should be able to read ingressclass when only kubernetesCRD is enabled
    set:
      providers:
        kubernetesIngress:
          enabled: false
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - extensions
              - networking.k8s.io
            resources:
              - ingressclasses
            verbs:
              - get
              - list
              - watch
        template: rbac/clusterrole.yaml
  - it: ClusterRole should not be able to read CRDs when kubernetesCRD is disabled
    set:
      providers:
        kubernetesCRD:
          enabled: false
    asserts:
      - notContains:
          path: rules
          content:
            - apiGroups:
                - traefik.io
              resources:
                - ingressroutes
                - ingressroutetcps
                - ingressrouteudps
                - middlewares
                - middlewaretcps
                - serverstransports
                - serverstransporttcps
                - tlsoptions
                - tlsstores
                - traefikservices
              verbs:
                - get
                - list
                - watch
        template: rbac/clusterrole.yaml
  - it: should use helm managed namespace as default behavior
    set:
      rbac:
        namespaced: true
    asserts:
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/role.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/serviceaccount.yaml
  - it: should use multiple namespaces if provided to kubernetesCRD
    set:
      providers:
        kubernetesCRD:
          namespaces:
            - default
            - foo
      rbac:
        namespaced: true
    asserts:
      - hasDocuments:
          count: 3
        template: rbac/role.yaml
      - hasDocuments:
          count: 3
        template: rbac/rolebinding.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/role.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: default
        template: rbac/role.yaml
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: foo
        template: rbac/role.yaml
        documentIndex: 2
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/rolebinding.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: default
        template: rbac/rolebinding.yaml
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: foo
        template: rbac/rolebinding.yaml
        documentIndex: 2
  - it: should use multiple namespaces if provided to kubernetesIngress
    set:
      providers:
        kubernetesIngress:
          namespaces:
            - default
            - bar
      rbac:
        namespaced: true
    asserts:
      - hasDocuments:
          count: 3
        template: rbac/role.yaml
      - hasDocuments:
          count: 3
        template: rbac/rolebinding.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/role.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: bar
        template: rbac/role.yaml
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: default
        template: rbac/role.yaml
        documentIndex: 2
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/rolebinding.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: bar
        template: rbac/rolebinding.yaml
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: default
        template: rbac/rolebinding.yaml
        documentIndex: 2
  - it: should use multiple namespaces if provided to knative
    set:
      providers:
        knative:
          namespaces:
            - default
            - baz
      rbac:
        namespaced: true
    asserts:
      - hasDocuments:
          count: 3
        template: rbac/role.yaml
      - hasDocuments:
          count: 3
        template: rbac/rolebinding.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/role.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: baz
        template: rbac/role.yaml
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: default
        template: rbac/role.yaml
        documentIndex: 2
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/rolebinding.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: baz
        template: rbac/rolebinding.yaml
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: default
        template: rbac/rolebinding.yaml
        documentIndex: 2
  - it: should use multiple namespaces if provided to hub
    set:
      hub:
        namespaces:
          - default
          - bar
      rbac:
        namespaced: true
    asserts:
      - hasDocuments:
          count: 3
        template: rbac/role.yaml
      - hasDocuments:
          count: 3
        template: rbac/rolebinding.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/role.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: bar
        template: rbac/role.yaml
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: default
        template: rbac/role.yaml
        documentIndex: 2
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/rolebinding.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: bar
        template: rbac/rolebinding.yaml
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: default
        template: rbac/rolebinding.yaml
        documentIndex: 2
  - it: should use multiple namespaces if provided to all namespaced providers
    set:
      providers:
        kubernetesCRD:
          namespaces:
            - default
            - foo
        kubernetesIngress:
          namespaces:
            - default
            - bar
        knative:
          namespaces:
            - default
            - qux
      hub:
        namespaces:
          - default
          - baz
      rbac:
        namespaced: true
    asserts:
      - hasDocuments:
          count: 6
        template: rbac/role.yaml
      - hasDocuments:
          count: 6
        template: rbac/rolebinding.yaml
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/role.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: bar
        template: rbac/role.yaml
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: baz
        template: rbac/role.yaml
        documentIndex: 2
      - equal:
          path: metadata.namespace
          value: default
        template: rbac/role.yaml
        documentIndex: 3
      - equal:
          path: metadata.namespace
          value: foo
        template: rbac/role.yaml
        documentIndex: 4
      - equal:
          path: metadata.namespace
          value: qux
        template: rbac/role.yaml
        documentIndex: 5
      - equal:
          path: metadata.namespace
          value: NAMESPACE
        template: rbac/rolebinding.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: bar
        template: rbac/rolebinding.yaml
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: baz
        template: rbac/rolebinding.yaml
        documentIndex: 2
      - equal:
          path: metadata.namespace
          value: default
        template: rbac/rolebinding.yaml
        documentIndex: 3
      - equal:
          path: metadata.namespace
          value: foo
        template: rbac/rolebinding.yaml
        documentIndex: 4
      - equal:
          path: metadata.namespace
          value: qux
        template: rbac/rolebinding.yaml
        documentIndex: 5
  - it: should accept overridden namespace
    set:
      namespaceOverride: "traefik-ns-override"
      rbac:
        namespaced: true
    asserts:
      - equal:
          path: metadata.namespace
          value: "traefik-ns-override"
        template: rbac/role.yaml
      - equal:
          path: metadata.namespace
          value: "traefik-ns-override"
        template: rbac/serviceaccount.yaml
  - it: should accept overridden namespace for clusterrolebinding sa
    set:
      namespaceOverride: "traefik-ns-override"
    asserts:
      - equal:
          path: subjects[0].namespace
          value: "traefik-ns-override"
        template: rbac/clusterrolebinding.yaml
  - it: should use helm managed namespace for rolebinding sa
    set:
      rbac:
        namespaced: true
    asserts:
      - equal:
          path: subjects[0].namespace
          value: NAMESPACE
        template: rbac/rolebinding.yaml
  - it: should accept overridden namespace for rolebinding sa
    set:
      namespaceOverride: "traefik-ns-override"
      rbac:
        namespaced: true
    asserts:
      - equal:
          path: subjects[0].namespace
          value: "traefik-ns-override"
        template: rbac/rolebinding.yaml
  - it: cluster rbac should be only on traefik.io API group
    set:
    asserts:
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - traefik.io
            resources:
              - ingressroutes
              - ingressroutetcps
              - ingressrouteudps
              - middlewares
              - middlewaretcps
              - serverstransports
              - serverstransporttcps
              - tlsoptions
              - tlsstores
              - traefikservices
            verbs:
              - get
              - list
              - watch
  - it: namespaced rbac should be only on traefik.io API group
    set:
      rbac:
        namespaced: true
    asserts:
      - template: rbac/role.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - traefik.io
            resources:
              - ingressroutes
              - ingressroutetcps
              - ingressrouteudps
              - middlewares
              - middlewaretcps
              - tlsoptions
              - tlsstores
              - traefikservices
              - serverstransports
              - serverstransporttcps
            verbs:
              - get
              - list
              - watch
  - it: cluster rbac should be created by default
    asserts:
      - isKind:
          of: ClusterRole
        template: rbac/clusterrole.yaml
      - isKind:
          of: ClusterRoleBinding
        template: rbac/clusterrolebinding.yaml
      - hasDocuments:
          count: 0
        template: rbac/role.yaml
      - hasDocuments:
          count: 0
        template: rbac/rolebinding.yaml
  - it: should provide expected cluster rbac when k8s gw api is enabled
    set:
      providers:
        kubernetesGateway:
          enabled: true
    asserts:
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - gateway.networking.k8s.io
            resources:
              - backendtlspolicies/status
              - gatewayclasses/status
              - gateways/status
              - grpcroutes/status
              - httproutes/status
              - tcproutes/status
              - tlsroutes/status
            verbs:
              - update
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - gateway.networking.k8s.io
            resources:
              - backendtlspolicies
              - gatewayclasses
              - gateways
              - grpcroutes
              - httproutes
              - referencegrants
              - tcproutes
              - tlsroutes
            verbs:
              - get
              - list
              - watch
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - namespaces
            verbs:
              - list
              - watch

  - it: should provide expected cluster rbac when knative provider is enabled
    set:
      providers:
        knative:
          enabled: true
    asserts:
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - networking.internal.knative.dev
            resources:
              - ingresses
            verbs:
              - get
              - list
              - watch
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - networking.internal.knative.dev
            resources:
              - ingresses/status
            verbs:
              - update

  - it: should provide expected cluster rbac
    asserts:
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - configmaps
              - nodes
              - services
            verbs:
              - get
              - list
              - watch
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
            verbs:
              - get

  - it: should provide expected role rbac
    set:
      providers:
        kubernetesCRD:
          enabled: true
      rbac:
        namespaced: true
    asserts:
      - template: rbac/role.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - configmaps
              - services
            verbs:
              - get
              - list
              - watch


  - it: should contain additional RBACS for hub API gateway
    set:
      hub:
        token: xxx
    asserts:
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - hub.traefik.io
            resources:
              - aiservices
            verbs:
              - list
              - watch
              - get

      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - namespaces
            verbs:
              - get
              - list
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - secrets
            verbs:
              - get
              - list
              - watch
              - update
              - create
              - delete
              - deletecollection
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - coordination.k8s.io
            resources:
              - leases
            verbs:
              - get
              - list
              - watch
              - create
              - update
              - patch
              - delete

  - it: should not contain additional RBACS for hub > 3.19.0 API management
    set:
      image:
        tag: v3.19.0
      hub:
        token: xxx
        apimanagement:
          enabled: true
    asserts:
      - template: rbac/clusterrole.yaml
        notContains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - nodes
            verbs:
              - list
              - watch
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - endpoints
            verbs:
              - list
              - watch

  - it: should contain status subresource permissions for hub API management in namespaced mode
    set:
      image:
        tag: v3.19.0
      hub:
        token: xxx
        apimanagement:
          enabled: true
      rbac:
        namespaced: true
    asserts:
      - template: rbac/role.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - hub.traefik.io
            resources:
              - apiauths/status
              - apiportals/status
              - apiportalauths/status
              - apis/status
              - apiversions/status
              - apibundles/status
              - apiplans/status
              - apicatalogitems/status
              - managedsubscriptions/status
              - managedapplications/status
            verbs:
              - get
              - update
              - patch

  - it: should contain status subresource permissions for hub API management in cluster mode
    set:
      image:
        tag: v3.19.0
      hub:
        token: xxx
        apimanagement:
          enabled: true
    asserts:
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - hub.traefik.io
            resources:
              - apiauths/status
              - apiportals/status
              - apiportalauths/status
              - apis/status
              - apiversions/status
              - apibundles/status
              - apiplans/status
              - apicatalogitems/status
              - managedsubscriptions/status
              - managedapplications/status
            verbs:
              - get
              - update
              - patch

  - it: should provide expected RBACS for Hub version >3.3.2 and <3.7.0
    set:
      image:
        tag: v3.6.0
      hub:
        token: "xxx"
    asserts:
      - template: rbac/clusterrole.yaml
        notContains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - endpoints
              - services
            verbs:
              - get
              - list
              - watch
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - discovery.k8s.io
            resources:
              - endpointslices
            verbs:
              - list
              - watch
  - it: should add RBAC rules when kubernetesIngressNGINX is enabled
    set:
      providers:
        kubernetesIngressNGINX:
          enabled: true
        kubernetesIngress:
          enabled: false
        kubernetesCRD:
          enabled: false
    asserts:
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - extensions
              - networking.k8s.io
            resources:
              - ingressclasses
              - ingresses
            verbs:
              - get
              - list
              - watch
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - extensions
              - networking.k8s.io
            resources:
              - ingresses/status
            verbs:
              - update
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - namespaces
            verbs:
              - list
              - watch
  - it: should not duplicate RBAC rules when kubernetesIngress is also enabled
    set:
      providers:
        kubernetesIngressNGINX:
          enabled: true
        kubernetesIngress:
          enabled: true
    asserts:
      - template: rbac/clusterrole.yaml
        contains:
          path: rules
          count: 1
          content:
            apiGroups:
              - extensions
              - networking.k8s.io
            resources:
              - ingressclasses
              - ingresses
            verbs:
              - get
              - list
              - watch
  - it: should not add RBAC rules when kubernetesIngressNGINX is disabled
    set:
      providers:
        kubernetesIngressNGINX:
          enabled: false
        kubernetesIngress:
          enabled: false
        kubernetesCRD:
          enabled: false
    asserts:
      - template: rbac/clusterrole.yaml
        notContains:
          path: rules
          content:
            apiGroups:
              - extensions
              - networking.k8s.io
            resources:
              - ingressclasses
              - ingresses
            verbs:
              - get
              - list
              - watch
  - it: Role should be able to read ingresses when kubernetesIngressNGINX is enabled without kubernetesIngress
    set:
      providers:
        kubernetesIngress:
          enabled: false
        kubernetesIngressNGINX:
          enabled: true
      rbac:
        namespaced: true
    asserts:
      - template: rbac/role.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - extensions
              - networking.k8s.io
            resources:
              - ingresses
            verbs:
              - get
              - list
              - watch
      - template: rbac/role.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - extensions
              - networking.k8s.io
            resources:
              - ingresses/status
            verbs:
              - update
  - it: Role should be able to update ingresses/status when both kubernetesIngress and kubernetesIngressNGINX are enabled
    set:
      providers:
        kubernetesIngress:
          enabled: true
        kubernetesIngressNGINX:
          enabled: true
      rbac:
        namespaced: true
    asserts:
      - template: rbac/role.yaml
        contains:
          path: rules
          content:
            apiGroups:
              - extensions
              - networking.k8s.io
            resources:
              - ingresses/status
            verbs:
              - update
  - it: Role should not have kubernetesIngressNGINX permissions when provider is disabled
    set:
      providers:
        kubernetesIngress:
          enabled: false
        kubernetesIngressNGINX:
          enabled: false
      rbac:
        namespaced: true
    asserts:
      - template: rbac/role.yaml
        notContains:
          path: rules
          content:
            apiGroups:
              - extensions
