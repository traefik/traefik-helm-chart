suite: ingressroute naming
templates:
  - ingressroute.yaml
tests:
  - it: lowercases custom ingressroute keys to RFC 1123-compatible output
    set:
      ingressRoute:
        MyRoute:
          enabled: true
          entryPoints:
            - traefik
          matchRule: PathPrefix(`/demo`)
          services:
            - name: api@internal
              kind: TraefikService
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-myroute
