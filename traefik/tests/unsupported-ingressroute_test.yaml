suite: unsupported IngressRoute configuration
templates:
- ingressroute.yaml
tests:
- it: should not fail when enabling an unsupported IngressRoute
  set:
    ingressRoute:
      api:
        enabled: true
  asserts:
  - hasDocuments:
      count: 1
  - equal:
      path: metadata.name
      value: release-name-api

- it: should lowercase unsupported ingressroute names to RFC 1123
  release:
    name: release-name
  set:
    ingressRoute:
      kubernetesCRD:
        enabled: true
        matchRule: PathPrefix(`/crd`)
        entryPoints: ["web"]
  asserts:
  - equal:
      path: metadata.name
      value: release-name-kubernetescrd
