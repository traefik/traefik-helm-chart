suite: Kubernetes Ingress NGINX provider
templates:
  - deployment.yaml
set:
  providers:
    kubernetesIngressNGINX:
      enabled: true
tests:
  - it: should set default args when enabled
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.controllerClass=k8s.io/ingress-nginx"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.ingressClass=nginx"

  - it: should add custom controllerClass and ingressClass
    set:
      providers:
        kubernetesIngressNGINX:
          controllerClass: "custom.io/nginx-controller"
          ingressClass: "custom-nginx"
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.controllerClass=custom.io/nginx-controller"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.ingressClass=custom-nginx"

  - it: should add ingressClassByName & watchIngressWithoutClass flag
    set:
      providers:
        kubernetesIngressNGINX:
          ingressClassByName: true
          watchIngressWithoutClass: true
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.ingressClassByName=true"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.watchIngressWithoutClass=true"

  - it: should add watched namespaces & namespace selector
    set:
      providers:
        kubernetesIngressNGINX:
          watchNamespace: "nginx-ingress"
          watchNamespaceSelector: "environment=production"
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.watchnamespace=nginx-ingress"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.watchNamespaceSelector=environment=production"

  - it: should add publishService when enabled
    set:
      providers:
        kubernetesIngressNGINX:
          publishService:
            enabled: true
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.publishservice=NAMESPACE/RELEASE-NAME-traefik"

  - it: should add custom publishService path
    set:
      providers:
        kubernetesIngressNGINX:
          publishService:
            enabled: true
            pathOverride: "custom-namespace/custom-service"
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.publishservice=custom-namespace/custom-service"

  - it: should add publishStatusAddress
    set:
      providers:
        kubernetesIngressNGINX:
          publishStatusAddress: "1.2.3.4,5.6.7.8"
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.publishStatusAddress=1.2.3.4,5.6.7.8"

  - it: should add defaultBackendService & disableSvcExternalName
    set:
      providers:
        kubernetesIngressNGINX:
          defaultBackendService: "default/default-backend"
          disableSvcExternalName: true
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.defaultBackendService=default/default-backend"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.disableSvcExternalName=true"

  - it: should add throttleDuration
    set:
      providers:
        kubernetesIngressNGINX:
          throttleDuration: "10s"
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.throttleDuration=10s"

  - it: should add certAuthFilePath
    set:
      providers:
        kubernetesIngressNGINX:
          certAuthFilePath: "/etc/kubernetes/ca.crt"
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.certAuthFilePath=/etc/kubernetes/ca.crt"

  - it: should add endpoint
    set:
      providers:
        kubernetesIngressNGINX:
          endpoint: "https://k8s.example.com:6443"
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.endpoint=https://k8s.example.com:6443"

  - it: should add token
    set:
      providers:
        kubernetesIngressNGINX:
          token: "my-bearer-token"
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.token=my-bearer-token"

  - it: should add proxy and buffering settings
    set:
      providers:
        kubernetesIngressNGINX:
          proxyRequestBuffering: true
          clientBodyBufferSize: 16384
          proxyBodySize: 1048576
          proxyBuffering: true
          proxyBufferSize: 8192
          proxyBuffersNumber: 4
          proxyConnectTimeout: 60
          proxyReadTimeout: 60
          proxySendTimeout: 60
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.proxyRequestBuffering=true"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.clientBodyBufferSize=16384"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.proxyBodySize=1048576"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.proxyBuffering=true"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.proxyBufferSize=8192"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.proxyBuffersNumber=4"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.proxyConnectTimeout=60"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.proxyReadTimeout=60"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.proxySendTimeout=60"

  - it: should add proxy next upstream settings
    set:
      providers:
        kubernetesIngressNGINX:
          proxyNextUpstream: "error timeout"
          proxyNextUpstreamTries: 3
          proxyNextUpstreamTimeout: 30
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.proxyNextUpstream=error timeout"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.proxyNextUpstreamTries=3"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.proxyNextUpstreamTimeout=30"

  - it: should add customHTTPErrors
    set:
      providers:
        kubernetesIngressNGINX:
          customHTTPErrors:
            - "404"
            - "503"
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.customHTTPErrors=404,503"

  - it: should add upstreamKeepaliveTimeout
    set:
      providers:
        kubernetesIngressNGINX:
          upstreamKeepaliveTimeout: 120
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.upstreamKeepaliveTimeout=120"

  - it: should add allowCrossNamespaceResources & globalAllowedResponseHeaders
    set:
      providers:
        kubernetesIngressNGINX:
          allowCrossNamespaceResources: true
          globalAllowedResponseHeaders:
            - "X-Custom-Header1"
            - "X-Custom-Header2"
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.allowCrossNamespaceResources=true"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.globalAllowedResponseHeaders=X-Custom-Header1,X-Custom-Header2"

  - it: should add allowSnippetAnnotations
    set:
      providers:
        kubernetesIngressNGINX:
          allowSnippetAnnotations: true
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.allowSnippetAnnotations=true"

  - it: should add httpEntryPoint & httpsEntryPoint
    set:
      providers:
        kubernetesIngressNGINX:
          httpEntryPoint: "web"
          httpsEntryPoint: "websecure"
    asserts:
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.httpEntryPoint=web"
      - template: deployment.yaml
        contains:
          path: spec.template.spec.containers[0].args
          content: "--providers.kubernetesingressnginx.httpsEntryPoint=websecure"
