apiVersion: v2
name: traefik
description: A Traefik based Kubernetes ingress controller
type: application
version: 40.3.0
# renovate: image=traefik
appVersion: v3.7.5
kubeVersion: '>=1.25.0-0'
keywords:
  - traefik
  - ingress
  - networking
home: https://traefik.io/
sources:
  - https://github.com/traefik/traefik-helm-chart
  - https://github.com/traefik/traefik
maintainers:
  - name: mloiseleur
    email: michel.loiseleur@traefik.io
  - name: darkweaver87
    email: remi.buisson@traefik.io
  - name: jnoordsij
icon: https://raw.githubusercontent.com/traefik/traefik/master/docs/content/assets/img/traefik.logo.png
annotations:
  traefik.io/proxy-min-version: v3.6.0
  traefik.io/proxy-max-version: v3.7.5
  traefik.io/hub-min-version: v3.19.3
  traefik.io/hub-max-version: v3.20.4
  artifacthub.io/changes: |
    - "fix(hub): :bug: guard nil hub.token in hub-license template"
    - "feat(proxy): :rocket: support traefik v3.7.4"
    - "feat(provider): :sparkles: support qps and burst on kubernetesGateway"
    - "feat(logs): :sparkles: support accesslog query parameters defaultmode"
    - "feat(hub): :rocket: support traefik hub v3.20.4"
    - "feat(CRDs): update Traefik Hub CRDs to v1.31.0"
    - "chore(release): 🚀 publish 40.3.0"
    - "chore(deps): support traefik v3.7.3 & hub v3.20.3"
    - "chore(ci): track proxy & hub max-version annotations with renovate"
