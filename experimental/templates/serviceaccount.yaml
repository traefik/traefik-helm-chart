{{- if kindIs "map" .Values.serviceAccount -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  {{- include "traefik.singletonMeta" (dict "ctx" . "key" "serviceAccount" "name" (include "traefik.fullname" .) "namespaced" true) | nindent 2 }}
# SA defaults to false so no *other* pod gets a token by accident; the pod opts
# in explicitly via its own automountServiceAccountToken: true.
automountServiceAccountToken: false
{{- end -}}
