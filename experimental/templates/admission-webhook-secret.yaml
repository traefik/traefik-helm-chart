{{- $entry := index (.Values.secret | default dict) "hub-admission" -}}
{{- if and (kindIs "map" $entry) (include "traefik.hubAdmissionEnabled" .) -}}
{{- $cert := include "traefik.admissionWebhookCert" . | fromYaml -}}
apiVersion: v1
kind: Secret
metadata:
  {{- include "traefik.objectMeta" (dict "ctx" . "name" (include "traefik.admissionWebhookSecretName" .) "namespace" (include "traefik.namespace" .) "userMetadata" ($entry.metadata | default dict)) | nindent 2 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.cert | quote }}
  tls.key: {{ $cert.key | quote }}
{{- end -}}
