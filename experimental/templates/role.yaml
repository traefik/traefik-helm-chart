  {{- if kindIs "map" .Values.role -}}
{{- $ctx := . -}}
{{- $fullname := include "traefik.fullname" $ctx -}}
{{- $userMeta := ($ctx.Values.role | default dict).metadata | default dict -}}
{{- $namespaces := include "traefik.providerNamespaces" $ctx | fromYamlArray -}}
{{- range $ns := $namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  {{- include "traefik.objectMeta" (dict
      "ctx" $ctx
      "name" $fullname
      "namespace" $ns
      "userMetadata" $userMeta
  ) | nindent 2 }}
rules:
  {{- include "traefik.roleRulesForNamespace" (dict "ctx" $ctx "ns" $ns) | nindent 2 }}
{{- end }}
{{- end -}}
