suite: IngressClass
templates:
  - ingress-class.yaml
tests:
  - it: rendered by default as the cluster-default class
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: IngressClass
      - equal:
          path: metadata.name
          value: RELEASE-NAME-traefik
      - equal:
          path: spec.controller
          value: traefik.io/ingress-controller
      - equal:
          path: metadata.annotations["ingressclass.kubernetes.io/is-default-class"]
          value: "true"

  - it: disabled with ingressClass=null
    set:
      ingressClass: null
    asserts:
      - hasDocuments:
          count: 0

  - it: marks the class default via the metadata hatch
    set:
      ingressClass:
        metadata:
          annotations:
            ingressclass.kubernetes.io/is-default-class: "true"
    asserts:
      - equal:
          path: metadata.annotations["ingressclass.kubernetes.io/is-default-class"]
          value: "true"
