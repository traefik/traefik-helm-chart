suite: imagePullSecrets land on the pod template
templates:
  - deployment.yaml
tests:
  - it: default install has no imagePullSecrets in pod spec
    asserts:
      - notExists:
          path: spec.template.spec.imagePullSecrets

  - it: imagePullSecrets are added verbatim to the pod spec
    set:
      imagePullSecrets:
        - name: my-registry
        - name: backup-registry
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: my-registry
            - name: backup-registry

  - it: empty imagePullSecrets list does not render the field
    set:
      imagePullSecrets: []
    asserts:
      - notExists:
          path: spec.template.spec.imagePullSecrets

  - it: deployment.spec merges imagePullSecrets by name (chart entry kept)
    set:
      imagePullSecrets:
        - name: chart-default
      deployment.spec.template.spec.imagePullSecrets:
        - name: user-added
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: chart-default
            - name: user-added

  - it: "$patch: replace overrides imagePullSecrets wholesale"
    set:
      imagePullSecrets:
        - name: chart-default
      deployment.spec.template.spec.imagePullSecrets:
        - $patch: replace
        - name: only-mine
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: only-mine
